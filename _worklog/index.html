<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 엣지박스 — 작업 진행 타임라인</title>
<script src="slides_data.js"></script>
<style>
  :root{
    --bg:#0f172a; --panel:#111c33; --card:#1e293b; --ink:#f1f5f9; --muted:#94a3b8;
    --q:#38bdf8; --decide:#34d399; --reason:#cbd5e1; --accent:#818cf8; --line:#334155;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",system-ui,sans-serif;
    background:var(--bg); color:var(--ink); height:100vh; display:flex; flex-direction:column; overflow:hidden;
  }
  /* 상단 바 */
  header.top{
    flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
    padding:12px 22px; border-bottom:1px solid var(--line); background:var(--panel);
  }
  header.top .t{font-size:16px; font-weight:700;}
  header.top .s{font-size:12px; color:var(--muted);}
  /* 본체: 좌 타임라인 + 우 내용 */
  .wrap{flex:1 1 auto; display:flex; min-height:0;}
  /* 좌측 타임라인 */
  aside{
    flex:0 0 var(--side,340px); border-right:1px solid var(--line); background:var(--panel);
    overflow-y:auto; padding:18px 10px 30px; min-width:200px;
  }
  /* 좌·우 폭 조절 구분선 (드래그) */
  .resizer{
    flex:0 0 6px; cursor:col-resize; background:transparent; position:relative; z-index:5;
    transition:background .15s;
  }
  .resizer::before{ content:""; position:absolute; left:2px; top:0; bottom:0; width:2px; background:var(--line); }
  .resizer:hover, .resizer.drag{ background:rgba(129,140,248,.25); }
  .resizer:hover::before, .resizer.drag::before{ background:var(--accent); }
  body.resizing{ cursor:col-resize; user-select:none; }
  aside h2{font-size:13px; color:var(--accent); letter-spacing:1px; font-weight:700; padding:6px 14px 14px;}
  .tl{position:relative; list-style:none;}
  .tl::before{content:""; position:absolute; left:23px; top:6px; bottom:6px; width:2px; background:var(--line);}
  .tl li{position:relative; padding:0;}
  .tl button{
    width:100%; text-align:left; background:none; border:none; color:inherit; cursor:pointer;
    display:flex; gap:12px; align-items:flex-start; padding:11px 14px 11px 14px; border-radius:10px;
    font-family:inherit; transition:.15s; line-height:1.4;
  }
  .tl button:hover{background:#1b2840;}
  .tl button.active{background:#22304d;}
  .tl .dot{
    flex:0 0 18px; width:18px; height:18px; border-radius:50%; margin-top:2px; z-index:1;
    background:var(--card); border:2px solid var(--line); display:flex; align-items:center; justify-content:center;
    font-size:10px; font-weight:700; color:var(--muted);
  }
  .tl button.active .dot{border-color:var(--accent); background:var(--accent); color:#0f172a;}
  .tl .meta{flex:1 1 auto; min-width:0;}
  .tl .tag{display:inline-block; font-size:10px; font-weight:700; padding:1px 7px; border-radius:999px; margin-bottom:3px;}
  .tl .wdate{float:right; font-size:11px; color:#64748b; font-weight:600; margin-top:1px; margin-left:6px;}
  .tag.cover{background:#3b3357; color:#c4b5fd;}
  .tag.info{background:#1e3a3a; color:#7ee3c4;}
  .tag.qna{background:#0e3550; color:#7dd3fc;}
  .tl .ttl{font-size:14px; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .tl button.active .ttl{font-weight:600;}
  /* 우측 내용 */
  main{flex:1 1 auto; overflow-y:auto; padding:34px 44px 60px;}
  .content{max-width:820px; margin:0 auto; animation:fade .3s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}
  /* 표지 */
  .cover{text-align:center; padding:50px 0; display:flex; flex-direction:column; gap:16px; align-items:center;}
  .cover .badge{font-size:12px; letter-spacing:2px; color:var(--accent); border:1px solid var(--accent); padding:4px 13px; border-radius:999px;}
  .cover h1{font-size:40px; line-height:1.2;}
  .cover h2{font-size:23px; color:var(--q); font-weight:600;}
  .cover .note{font-size:15px; color:var(--muted); max-width:520px;}
  /* 정보 */
  .kicker{font-size:13px; color:var(--accent); font-weight:700; letter-spacing:1px; margin-bottom:10px;}
  h3.title{font-size:28px; margin-bottom:22px; line-height:1.3;}
  ul.bullets{list-style:none; display:flex; flex-direction:column; gap:14px;}
  ul.bullets li{position:relative; padding-left:26px; font-size:18px; line-height:1.55;}
  ul.bullets li::before{content:""; position:absolute; left:5px; top:10px; width:9px; height:9px; border-radius:50%; background:var(--accent);}
  /* Q&A */
  .qnum{display:inline-block; font-size:12px; font-weight:700; color:#0f172a; background:var(--q); padding:4px 12px; border-radius:999px; margin-bottom:16px;}
  .qline{font-size:26px; font-weight:700; line-height:1.4; margin-bottom:18px;}
  .qline .qmark{color:var(--q); margin-right:8px;}
  .ctx{font-size:14px; color:var(--muted); margin-bottom:22px; padding-left:14px; border-left:3px solid var(--line);}
  .block{border-radius:12px; padding:16px 20px; margin-bottom:14px;}
  .block.decide{background:rgba(52,211,153,.10); border:1px solid rgba(52,211,153,.35);}
  .block.reason{background:rgba(203,213,225,.06); border:1px solid var(--line);}
  .block .lbl{font-size:12px; font-weight:700; letter-spacing:1px; margin-bottom:8px;}
  .block.decide .lbl{color:var(--decide);}
  .block.reason .lbl{color:var(--reason);}
  .block .txt{font-size:18px; line-height:1.5;}
  .block.reason ul{list-style:none; display:flex; flex-direction:column; gap:8px;}
  .block.reason li{position:relative; padding-left:20px; font-size:15px; line-height:1.5; color:var(--reason);}
  .block.reason li::before{content:"–"; position:absolute; left:2px; color:var(--muted);}
  code{background:#0b1220; padding:2px 7px; border-radius:5px; font-size:.9em; color:#7dd3fc;}
  /* 본문 표·리치 콘텐츠 */
  .rich table{width:100%; border-collapse:collapse; margin:14px 0; font-size:13.5px;}
  .rich th, .rich td{border:1px solid var(--line); padding:7px 9px; text-align:left; vertical-align:top; line-height:1.45;}
  .rich th{background:#22304d; font-weight:600; color:var(--ink);}
  .rich tr:nth-child(even) td{background:rgba(255,255,255,.02);}
  .rich h4{font-size:17px; margin:18px 0 8px; color:var(--q);}
  .rich p{font-size:15px; line-height:1.55; margin:8px 0;}
  .rich ul{margin:6px 0 6px 2px; padding-left:20px;}
  .rich li{font-size:14.5px; line-height:1.5; margin:5px 0;}
  .rich .warn{background:rgba(248,113,113,.10); border:1px solid rgba(248,113,113,.4); border-radius:10px; padding:11px 15px; margin:12px 0; font-size:14.5px;}
  .rich .good{background:rgba(52,211,153,.10); border:1px solid rgba(52,211,153,.35); border-radius:10px; padding:11px 15px; margin:12px 0; font-size:14.5px;}
  .rich .ok{color:#34d399; font-weight:700;}
  .rich .bad{color:#f87171; font-weight:700;}
  .rich small{color:var(--muted);}
  /* 관련 문서 링크 */
  .docs{margin-top:24px; padding-top:18px; border-top:1px dashed var(--line);}
  .docs .lbl{font-size:13px; font-weight:700; letter-spacing:1px; color:var(--accent); margin-bottom:12px;}
  .docs .links{display:flex; flex-direction:column; gap:12px;}
  .doc{background:rgba(56,189,248,.06); border:1px solid var(--line); border-radius:11px; padding:13px 16px;}
  .doc .docname{font-size:16px; font-weight:600; margin-bottom:10px;}
  .doc .docname .ext{font-size:12px; color:var(--muted); font-weight:400; margin-left:6px;}
  .doc .acts{display:flex; flex-wrap:wrap; gap:8px;}
  .doc .acts a{
    display:inline-flex; align-items:center; gap:6px; text-decoration:none; color:var(--ink);
    background:rgba(56,189,248,.10); border:1px solid rgba(56,189,248,.35);
    padding:7px 13px; border-radius:8px; font-size:14px; transition:.15s;
  }
  .doc .acts a:hover{background:rgba(56,189,248,.20); border-color:var(--q);}
  .doc .acts a.secondary{background:rgba(203,213,225,.06); border-color:var(--line); color:var(--muted);}
  .doc .acts a.secondary:hover{color:var(--ink); border-color:var(--accent);}
  /* 하단 이동 */
  .pager{max-width:820px; margin:30px auto 0; display:flex; justify-content:space-between; gap:12px;}
  .pager button{font-family:inherit; font-size:14px; color:var(--ink); background:var(--card); border:1px solid var(--line); border-radius:9px; padding:9px 18px; cursor:pointer;}
  .pager button:hover{border-color:var(--accent); background:#334155;}
  .pager button:disabled{opacity:.3; cursor:not-allowed;}
  /* 반응형 */
  @media(max-width:760px){
    .wrap{flex-direction:column;}
    aside{flex:0 0 auto; max-height:38vh; border-right:none; border-bottom:1px solid var(--line);}
    main{padding:24px 18px 50px;}
  }
</style>
</head>
<body>
  <header class="top">
    <span class="t" id="ptitle">작업 진행 타임라인</span>
    <span class="s" id="pupd"></span>
  </header>
  <div class="wrap">
    <aside>
      <h2>📌 진행 타임라인 (목차)</h2>
      <ul class="tl" id="tl"></ul>
    </aside>
    <div class="resizer" id="resizer" title="끌어서 폭 조절"></div>
    <main>
      <div class="content" id="content"></div>
      <div class="pager">
        <button id="prev">◀ 이전 항목</button>
        <button id="next">다음 항목 ▶</button>
      </div>
    </main>
  </div>

<script>
(function(){
  var content=document.getElementById("content");
  if(typeof DECK==="undefined"){
    content.innerHTML="<p style='color:#f87171'>slides_data.js 를 불러오지 못했습니다.</p>";
    return;
  }
  var slides=DECK.slides||[], i=0;
  document.getElementById("ptitle").textContent=DECK.project||DECK.title||"작업 진행 타임라인";
  // 브라우저 탭 제목을 각 프로젝트 이름으로 설정 (meta.json title)
  document.title = (DECK.title || DECK.project || "작업 타임라인");
  document.getElementById("pupd").textContent="갱신: "+(DECK.updated||"");

  // 타임라인 항목 짧은 제목 만들기
  function shortTitle(s){
    if(s.type==="cover") return s.title||"표지";
    if(s.type==="info"||s.type==="rich")  return s.kicker || s.title || "내용";
    if(s.type==="qna"){
      var q=s.q||""; if(q.length>22) q=q.slice(0,22)+"…";
      return (s.num? s.num+" · ":"")+q;
    }
    return "항목";
  }
  function tagOf(s){return s.type==="qna"?"qna":(s.type==="cover"?"cover":"info");}
  function tagLabel(s){return s.type==="qna"?"질문":(s.type==="cover"?"표지":(s.type==="rich"?"내용":"안내"));}

  // 좌측 타임라인 렌더
  function buildTL(){
    var ul=document.getElementById("tl"); ul.innerHTML="";
    slides.forEach(function(s,idx){
      var li=document.createElement("li");
      var b=document.createElement("button");
      b.dataset.idx=idx;
      b.innerHTML='<span class="dot">'+(idx+1)+'</span>'+
                  '<span class="meta"><span class="tag '+tagOf(s)+'">'+tagLabel(s)+'</span>'+
                  (s.date?'<span class="wdate">'+(s.date.length>=10?s.date.slice(5):s.date)+'</span>':'')+
                  '<span class="ttl">'+shortTitle(s)+'</span></span>';
      b.onclick=function(){go(idx);};
      li.appendChild(b); ul.appendChild(li);
    });
  }

  // 관련 자료 링크 렌더 (문서·영상 등 — 모두 크롬 새 탭에서 열림)
  var M365_URL = "https://m365.cloud.microsoft";
  // .md/.markdown 링크는 마크다운 뷰어(mdview.html)로 라우팅 → 브라우저에서 포맷 렌더
  function routeHref(href){
    var bare = String(href).split('?')[0].split('#')[0];
    if(/\.(md|markdown)$/i.test(bare)){
      return '/_worklog/mdview.html?path=' + encodeURIComponent(href);
    }
    return href;
  }
  function linkBtn(href, text, secondary){
    return '<a class="'+(secondary?"secondary":"")+'" href="'+routeHref(href)+'" target="_blank" rel="noopener">'+text+'</a>';
  }
  function renderLinks(s){
    if(!s.links || !s.links.length) return "";
    var icons={pdf:"📕", md:"📝", html:"🖼️", docx:"📄", doc:"📄", xlsx:"📊", pptx:"📽️",
               hwp:"📃", hwpx:"📃", video:"▶️", link:"🔗"};
    var h='<div class="docs"><div class="lbl">📎 관련 자료 (크롬 새 탭에서 열림)</div><div class="links">';
    s.links.forEach(function(l){
      var k=(l.kind||"").toLowerCase();
      var ic=icons[k]||"🔗";
      h+='<div class="doc"><div class="docname">'+ic+' '+l.label+
         (l.note?'<span class="ext">'+l.note+'</span>':'')+'</div><div class="acts">';
      var any=false;
      if(l.pdf){      h+=linkBtn(l.pdf, "📕 PDF로 보기", false); any=true; }
      if(l.original){ h+=linkBtn(l.original, "↗ 원본 열기/다운로드", true); any=true; }
      if(l.m365){     h+=linkBtn(M365_URL, "↗ M365에서 열기", true); any=true; }
      if(l.video){    h+=linkBtn(l.video, "▶ 영상 보기", false); any=true; }
      if(l.href && !any){
        h+=linkBtn(l.href, (k==="video"?"▶ 영상 보기":"열기 ↗"), false);
      }
      h+='</div></div>';
    });
    h+='</div></div>';
    return h;
  }

  // 우측 내용 렌더
  function renderContent(){
    var s=slides[i], h="";
    if(s.type==="cover"){
      h='<div class="cover"><span class="badge">'+(DECK.updated||"")+'</span><h1>'+s.title+'</h1>'+
        (s.subtitle?'<h2>'+s.subtitle+'</h2>':'')+(s.note?'<p class="note">'+s.note+'</p>':'')+'</div>';
    } else if(s.type==="qna"){
      h+=(s.num?'<span class="qnum">'+s.num+'</span>':'');
      h+='<div class="qline"><span class="qmark">Q.</span>'+s.q+'</div>';
      if(s.context) h+='<div class="ctx">상황 — '+s.context+'</div>';
      if(s.decision) h+='<div class="block decide"><div class="lbl">✓ 결정</div><div class="txt">'+s.decision+'</div></div>';
      if(s.reason&&s.reason.length){
        h+='<div class="block reason"><div class="lbl">왜 이렇게 정했나</div><ul>';
        s.reason.forEach(function(r){h+='<li>'+r+'</li>';}); h+='</ul></div>';
      }
    } else { // info / rich
      h+=(s.kicker?'<div class="kicker">'+s.kicker+'</div>':'');
      if(s.title) h+='<h3 class="title">'+s.title+'</h3>';
      if(s.bullets){h+='<ul class="bullets">'; s.bullets.forEach(function(b){h+='<li>'+b+'</li>';}); h+='</ul>';}
      if(s.html) h+='<div class="rich">'+s.html+'</div>';
    }
    if(s.type!=="cover") h+=renderLinks(s);
    content.innerHTML=h;
    document.querySelectorAll(".tl button").forEach(function(b){
      b.classList.toggle("active", +b.dataset.idx===i);
    });
    var act=document.querySelector(".tl button.active");
    if(act) act.scrollIntoView({block:"nearest"});
    document.getElementById("prev").disabled=(i===0);
    document.getElementById("next").disabled=(i===slides.length-1);
    document.querySelector("main").scrollTop=0;
  }
  function go(n){ i=Math.max(0,Math.min(slides.length-1,n)); renderContent(); }

  document.getElementById("prev").onclick=function(){go(i-1);};
  document.getElementById("next").onclick=function(){go(i+1);};
  document.addEventListener("keydown",function(e){
    if(e.key==="ArrowDown"||e.key==="ArrowRight"){go(i+1); e.preventDefault();}
    else if(e.key==="ArrowUp"||e.key==="ArrowLeft"){go(i-1); e.preventDefault();}
  });

  // 좌·우 폭 조절 (드래그 구분선)
  (function setupResizer(){
    var wrap=document.querySelector(".wrap"), rez=document.getElementById("resizer");
    if(!wrap||!rez) return;
    var KEY="worklog.sideWidth";
    var saved=parseInt(localStorage.getItem(KEY),10);
    if(saved && saved>=200) wrap.style.setProperty("--side", saved+"px");

    function clamp(px){
      var max=Math.max(260, wrap.clientWidth-360); // 우측 최소 360px 확보
      return Math.min(Math.max(px,200), max);
    }
    var dragging=false;
    function onMove(e){
      if(!dragging) return;
      var x=(e.touches?e.touches[0].clientX:e.clientX)-wrap.getBoundingClientRect().left;
      wrap.style.setProperty("--side", clamp(x)+"px");
    }
    function stop(){
      if(!dragging) return;
      dragging=false; document.body.classList.remove("resizing"); rez.classList.remove("drag");
      var w=parseInt(getComputedStyle(document.querySelector("aside")).width,10);
      if(w) localStorage.setItem(KEY, w);
    }
    function start(e){
      dragging=true; document.body.classList.add("resizing"); rez.classList.add("drag"); e.preventDefault();
    }
    rez.addEventListener("mousedown", start);
    rez.addEventListener("touchstart", start, {passive:false});
    document.addEventListener("mousemove", onMove);
    document.addEventListener("touchmove", onMove, {passive:false});
    document.addEventListener("mouseup", stop);
    document.addEventListener("touchend", stop);
    // 더블클릭 = 기본 폭(340px)으로 초기화
    rez.addEventListener("dblclick", function(){
      wrap.style.setProperty("--side","340px"); localStorage.setItem(KEY,340);
    });
  })();

  buildTL(); go(0);
})();
</script>

<!-- worklog:side-toggle — 좌측 목차 접기/펴기 (2026-07-11) -->
<script>
(function(){
  var KEY="worklog.sideHidden";
  var header=document.querySelector("header.top")||document.querySelector("header");
  var aside=document.querySelector(".wrap aside")||document.querySelector("aside");
  if(!header||!aside) return;
  if(document.getElementById("wlSideToggle")) return;

  var st=document.createElement("style");
  st.textContent=
    "body.side-hidden .wrap>aside{display:none !important;}"+
    "body.side-hidden .wrap>.resizer{display:none !important;}"+
    "#wlSideToggle{font-family:inherit;cursor:pointer;font-size:13px;font-weight:600;"+
    "line-height:1;color:var(--ink,#f1f5f9);background:var(--card,#1e293b);"+
    "border:1px solid var(--line,#334155);border-radius:8px;padding:7px 12px;"+
    "display:inline-flex;align-items:center;gap:6px;white-space:nowrap;"+
    "transition:border-color .15s,background .15s;}"+
    "#wlSideToggle:hover{border-color:var(--accent,#818cf8);background:#22304d;}"+
    "@media print{#wlSideToggle{display:none;}}";
  document.head.appendChild(st);

  var btn=document.createElement("button");
  btn.id="wlSideToggle"; btn.type="button";

  function sync(){
    var hidden=document.body.classList.contains("side-hidden");
    btn.textContent=hidden?"\u2630 \ubaa9\ucc28 \ubcf4\uae30":"\u25c0 \ubaa9\ucc28 \uc228\uae30\uae30";
    btn.title=(hidden?"\ubaa9\ucc28 \ud328\ub110 \ud3bc\uce58\uae30":"\ubaa9\ucc28 \ud328\ub110 \uc811\uae30")+" (\ub2e8\ucd95\ud0a4: T)";
    btn.setAttribute("aria-pressed", hidden?"true":"false");
  }
  function apply(hidden,save){
    document.body.classList.toggle("side-hidden",!!hidden);
    if(save){ try{localStorage.setItem(KEY,hidden?"1":"0");}catch(e){} }
    sync();
  }

  // 버튼 + 기존 제목을 좌측 그룹으로 묶어 헤더 레이아웃 유지(제목 왼쪽 / 갱신일 오른쪽)
  var titleEl=header.querySelector(".t");
  var group=document.createElement("div");
  group.style.cssText="display:flex;align-items:center;gap:14px;min-width:0;";
  header.insertBefore(group, header.firstChild);
  group.appendChild(btn);
  if(titleEl) group.appendChild(titleEl);

  var saved="0"; try{saved=localStorage.getItem(KEY)||"0";}catch(e){}
  apply(saved==="1", false);
  btn.addEventListener("click", function(){ apply(!document.body.classList.contains("side-hidden"), true); });

  document.addEventListener("keydown", function(e){
    if((e.key==="t"||e.key==="T") && !e.metaKey && !e.ctrlKey && !e.altKey){
      var el=document.activeElement, tag=el&&el.tagName;
      if(tag==="INPUT"||tag==="TEXTAREA"||(el&&el.isContentEditable)) return;
      apply(!document.body.classList.contains("side-hidden"), true);
      e.preventDefault();
    }
  });
})();
</script>

</body>
</html>
