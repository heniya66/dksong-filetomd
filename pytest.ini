[pytest]
# filestomdwgem pytest 설정 (최소 — 기존 테스트 디스커버리 동작 보존).
# 기존에는 설정 파일이 없어 pytest 기본값으로 동작했다(432 passed). 본 파일은
# integration 마커 등록만을 위해 추가한 것으로, 기본 디스커버리(tests/ 하위
# test_*.py)와 동일하게 유지한다(additive — 회귀 없음).
testpaths = tests
markers =
    integration: 실제 의존(Ollama 로컬 데몬·Gemini API) reachability/스모크 점검. 기본 skip — 환경변수 RUN_INTEGRATION 설정 시에만 실행.
